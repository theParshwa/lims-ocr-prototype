version: '3.9'

# ============================================================
# LIMS OCR - Full Stack Docker Compose
# ============================================================
#
# Usage:
#   cp backend/.env.example backend/.env   # fill in API keys
#   docker-compose up --build
#
# Access:
#   App:      http://localhost:3000
#   API docs: http://localhost:8000/docs

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: lims-ocr-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/lims_ocr.db
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:5173","http://frontend"]
    volumes:
      - lims_uploads:/app/uploads
      - lims_outputs:/app/outputs
      - lims_training:/app/training
      - lims_db:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_URL=
    container_name: lims-ocr-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  lims_uploads:
  lims_outputs:
  lims_training:
  lims_db:
