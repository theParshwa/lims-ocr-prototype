services:
  - type: web
    name: lims-ocr-backend
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    plan: free
    envVars:
      - key: AI_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: OCR_ENABLED
        value: "true"
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        sync: false
